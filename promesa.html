<script>
/* Petal rain on canvas — pure JS, no framework needed */
(function() {
  const canvas = document.getElementById('petal-canvas');
  const ctx = canvas.getContext('2d');

  const PETAL_COLORS = [
    '#c4536a','#e8899a','#f2c4cc','#a03050','#d4607a',
    '#b84060','#f0a8b4','#8b2040','#e07090','#fad0d8',
    '#7b1d30','#de8095','#ffc0cb'
  ];

  let W, H, petals = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createPetal() {
    return {
      x: Math.random() * W * 1.2 - W * 0.1,
      y: -20 - Math.random() * 100,
      size: 6 + Math.random() * 12,
      color: PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)],
      speedY: 0.6 + Math.random() * 1.2,
      speedX: -0.4 + Math.random() * 0.8,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (-0.015 + Math.random() * 0.03),
      sway: Math.random() * Math.PI * 2,
      swaySpeed: 0.008 + Math.random() * 0.012,
      swayAmp: 0.3 + Math.random() * 0.8,
      opacity: 0.5 + Math.random() * 0.45,
      scaleY: 0.5 + Math.random() * 0.5,
    };
  }

  function drawPetal(p) {
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.scale(1, p.scaleY);
    ctx.beginPath();
    const s = p.size;
    // Organic petal shape using bezier curves
    ctx.moveTo(0, -s);
    ctx.bezierCurveTo( s * 0.8, -s * 0.4,  s * 0.9,  s * 0.5,  0,  s);
    ctx.bezierCurveTo(-s * 0.9,  s * 0.5, -s * 0.8, -s * 0.4,  0, -s);
    ctx.fillStyle = p.color;
    ctx.fill();
    // Subtle vein
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.8);
    ctx.quadraticCurveTo(s * 0.1, 0, 0, s * 0.8);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }

  // Initialize
  for (let i = 0; i < 55; i++) {
    const p = createPetal();
    p.y = Math.random() * H;
    petals.push(p);
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);
    // Spawn new petals
    if (petals.length < 70 && Math.random() < 0.35) petals.push(createPetal());

    for (let i = petals.length - 1; i >= 0; i--) {
      const p = petals[i];
      p.sway += p.swaySpeed;
      p.x += p.speedX + Math.sin(p.sway) * p.swayAmp;
      p.y += p.speedY;
      p.rot += p.rotSpeed;
      drawPetal(p);
      if (p.y > H + 30 || p.x < -60 || p.x > W + 60) {
        petals.splice(i, 1);
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Heart burst helper ── */
function spawnHearts(cx, cy) {
  const count = 14;
  const offsets = [
    [-60,-80],[0,-100],[60,-80],[80,-40],[90,0],
    [60,40],[0,60],[-60,40],[-80,0],[-90,-40],
    [-30,-120],[30,-120],[-45,-50],[45,-50]
  ];
  offsets.slice(0, count).forEach(([dx, dy], i) => {
    const el = document.createElement('div');
    el.className = 'heart-burst';
    el.textContent = ['❤','🩷','💗','💖','💕'][i % 5];
    el.style.cssText = `left:${cx + dx}px;top:${cy + dy}px;animation-delay:${i * 0.04}s;font-size:${1 + Math.random()}rem`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500 + i * 40);
  });
}

/* ── Ripple on button ── */
function useRipple(ref) {
  return useCallback((e) => {
    const btn = ref.current;
    if (!btn) return;
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height) * 2;
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top - size / 2;
    const rip = document.createElement('div');
    rip.className = 'ripple';
    rip.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
    btn.appendChild(rip);
    spawnHearts(e.clientX, e.clientY);
    setTimeout(() => rip.remove(), 900);
  }, [ref]);
}

/* ── Scroll reveal hook ── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.15 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

            <div className="mt-6 relative z-10 fade-in">
              <p className="display-italic" style={{ color: 'var(--gold-2)', fontSize: '1.1rem' }}>
                {[...Array(pulseKey)].length > 0 && '❤'}
                {' '}prometemos no dejarnos.{' '}
                ❤
              </p>
            </div>
          )}
        </div>
      </section>

      {/* ── Galería de dos fotos ── */}
      <section className="px-6 pb-24 flex flex-wrap items-start justify-center gap-10 lg:gap-16">
        <div style={{
          background: '#faf5ec',
          padding: '0.9rem 0.9rem 2.6rem',
          boxShadow: '0 2px 8px rgba(0,0,0,.4), 0 14px 44px rgba(0,0,0,.5)',
          transform: 'rotate(-2.5deg)',
          transition: 'transform .6s cubic-bezier(.34,1.56,.64,1)',
          maxWidth: 260, width: '100%',
          cursor: 'default'
        }}
          onMouseEnter={e => e.currentTarget.style.transform = 'rotate(0deg) scale(1.03)'}
          onMouseLeave={e => e.currentTarget.style.transform = 'rotate(-2.5deg)'}>
          <img src="media/amy/IMG_0529_2.PNG" alt="" style={{ width:'100%', display:'block', objectFit:'cover', aspectRatio:'3/4' }} />
          <p style={{ fontFamily:'"Instrument Serif",Georgia,serif', fontStyle:'italic', fontSize:'.78rem', color:'#4a3a2e', textAlign:'center', marginTop:'.6rem', opacity:.65 }}>
            un momento nuestro.
          </p>
        </div>

        <div style={{
          background: '#faf5ec',
          padding: '0.9rem 0.9rem 2.6rem',
          boxShadow: '0 2px 8px rgba(0,0,0,.4), 0 14px 44px rgba(0,0,0,.5)',
          transform: 'rotate(2deg)',
          transition: 'transform .6s cubic-bezier(.34,1.56,.64,1)',
          maxWidth: 260, width: '100%',
          cursor: 'default'
        }}
          onMouseEnter={e => e.currentTarget.style.transform = 'rotate(0deg) scale(1.03)'}
          onMouseLeave={e => e.currentTarget.style.transform = 'rotate(2deg)'}>
          <img src="media/amy/IMG002.jpeg" alt="" style={{ width:'100%', display:'block', objectFit:'cover', aspectRatio:'3/4' }} />
          <p style={{ fontFamily:'"Instrument Serif",Georgia,serif', fontStyle:'italic', fontSize:'.78rem', color:'#4a3a2e', textAlign:'center', marginTop:'.6rem', opacity:.65 }}>
            guardado en el alma.
          </p>
        </div>
      </section>

      {/* ── Footer ── */}
      <footer className="text-center py-12 px-6">
        <div className="rule-gold w-20 mx-auto mb-6 opacity-30"></div>
        <p className="brand-mark">amy · MMXXV</p>
        <p className="display-italic mt-3" style={{ color: 'rgba(242,196,204,0.3)', fontSize: '0.9rem' }}>
          para siempre.
        </p>
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
