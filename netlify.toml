[build]
  command = "npm install && npm run build"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# index.html — sin caché para que siempre sea fresco
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# manifest.json — sin caché (se regenera)
[[headers]]
  for = "/media/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS y CSS compilados — caché larga (cambian solo si se redeploy)
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes y videos — caché larga
[[headers]]
  for = "/media/amy/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/pinki_promise.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
